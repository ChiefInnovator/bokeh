<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bokeh Screensaver</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="ui-layer">
        <select id="theme-selector">
            <option value="christmas" selected>Christmas</option>
            <option value="cyberpunk">Cyberpunk</option>
            <option value="ocean">Deep Ocean</option>
            <option value="desert">Desert</option>
            <option value="easter">Easter</option>
            <option value="forest">Enchanted Forest</option>
            <option value="july4">Fourth of July</option>
            <option value="halloween">Halloween</option>
            <option value="hanukkah">Hanukkah</option>
            <option value="nordic">Nordic</option>
            <option value="sunrise">Sunrise</option>
            <option value="sunset">Sunset</option>
            <option value="tron">Tron</option>
            <option value="valentine">Valentine's</option>
            <option value="warm">Warm City Lights</option>
        </select>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
